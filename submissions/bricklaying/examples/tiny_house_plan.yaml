project:
  name: Tiny House Foundation
  owner: Amina
  site: Plot 12, Riverside Estate

workers:
  - name: Mason crew
    skills: [masonry, inspection, rebar]
    max_effort: 8
  - name: Site assistant
    skills: [layout, cleanup, tool_setup]
    max_effort: 5

robot:
  name: RBT-01
  capabilities: [carry_materials, deliver_tools, site_scan, cleanup]
  payload_kg: 40

zones:
  - id: storage
    label: Material storage
    position: [-2.0, -1.5]
  - id: foundation
    label: Foundation trench
    position: [1.6, 0.8]
  - id: tool_bench
    label: Tool bench
    position: [-1.8, 1.4]
  - id: inspection
    label: Inspection point
    position: [2.0, -1.2]

tasks:
  - id: mark_layout
    title: Mark foundation layout
    zone: foundation
    required_skill: layout
    effort: 2
    risk: low
    dependencies: []
  - id: deliver_rebar
    title: Deliver rebar bundles
    zone: foundation
    required_skill: carry_materials
    effort: 4
    risk: medium
    dependencies: [mark_layout]
  - id: tie_rebar
    title: Tie rebar grid
    zone: foundation
    required_skill: rebar
    effort: 5
    risk: medium
    dependencies: [deliver_rebar]
  - id: bring_masonry_tools
    title: Bring masonry tools to trench
    zone: foundation
    required_skill: deliver_tools
    effort: 1
    risk: low
    dependencies: [mark_layout]
  - id: inspect_grid
    title: Inspect rebar placement
    zone: inspection
    required_skill: inspection
    effort: 2
    risk: high
    dependencies: [tie_rebar]
  - id: clean_walkway
    title: Clear walkway around foundation
    zone: foundation
    required_skill: cleanup
    effort: 2
    risk: low
    dependencies: [bring_masonry_tools]
